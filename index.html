  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;

    }

    /* ─── Page ───────────────────────────────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f3ee;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 2rem 1rem;
    }

    /* ─── Card ───────────────────────────────────────────── */
    .card {
      background: #ffffff;
      border: 1px solid #e2ddd6;
      border-radius: 16px;
      padding: 2.25rem 2.25rem 2rem;
      max-width: 580px;
      width: 100%;
      transition: background 0.6s ease, border-color 0.6s ease;
    }

    .card.doom {
      background: #fff8f8;
      border-color: #f0c0c0;
    }

    .card.winning {
      background: #fffdf5;
      border-color: #f0d080;
    }

    /* ─── Card header ────────────────────────────────────── */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .game-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    }

    .heart {
      font-size: 15px;
      transition: opacity 1s ease, filter 1s ease;
      color: #e05555;
    }

    /* ─── Question ───────────────────────────────────────── */
    .question-text {
      font-size: 1.5rem;
      line-height: 1.5;
      color: #1a1a1a;
      margin-bottom: 2rem;
      min-height: 72px;
      font-weight: 400;

    .ans-btn {
      background: transparent;

      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      text-align: left;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      color: #333;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
      line-height: 1.5;
    }

    .ans-btn:hover {
      border-color: #c47a20;
      color: #c47a20;
      background: #fdf6ec;
    }

    }

    .ans-btn.selected {

      color: #8a5010;
    }

    .ans-btn:disabled {

    /* ─── Progress bar ───────────────────────────────────── */
    .progress-bar {

      background: #ede9e3;
      border-radius: 2px;

      margin-top: 1.5rem;

    .end-screen {

      font-weight: 400;
    }

    .end-title.bad  { color: #a02020; }
    .end-title.good { color: #7a5010; }

    .end-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.875rem;

      margin-bottom: 0.25rem;
      line-height: 1.6;

    .end-stat {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    .end-stat.bad  { color: #a02020; }
    .end-stat.good { color: #8a5010; }

    .end-note {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.82rem;
      color: #999;

    .win-reveal {

    .retry-btn {

    .retry-btn:hover { background: #a05e10; }

    .copied-msg {

    /* ─── Transitions ────────────────────────────────────── */

<body>

  <div class="card" id="card">
    <div class="card-top">
      <span class="game-title">Does this make me look fat?</span>
      <span class="heart" id="heart">♥</span>
    </div>

    <div id="game-content" class="fade-in">
      <p class="question-text" id="question-text"></p>
      <div class="answers" id="answers"></div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // QUESTION TREE
    //
    // Each node:
    //   q      — the question string
    //   doom   — (optional) true: increments hidden poison score
    //   a      — array of exactly two answers:
    //              t  — answer text
    //              n  — next node ID
    //
    // Special terminal node IDs:
    //   "SOFA" — game over
    //   "WIN"  — victory
    //
    // GOLDEN PATH: q1 → q2 → q3 → ... → q15 → WIN
    // Correct answers are always the second option (index 1) on the golden path.
    // The winning secret: brutal, uncomfortable honesty every single time.
    //
    // DOOM CORRIDORS: da_, db_, dc_ prefixes
    // Wrong turns funnel into shared corridors of 5 questions before the sofa.
    // Players who went wrong at q3 and q11 may share the same corridor —
    // they will never know.
    // ─────────────────────────────────────────────────────────────────────────

    const TREE = {

      // ── GOLDEN PATH (q1–q35) ──────────────────────────────────────────────
      // Rule: answer index 1 always continues the golden path.
      // Answer index 0 always routes to a doom corridor.
      // The winning secret: brutal, uncomfortable honesty. Every. Single. Time.
      // Each question flows directly from the previous honest answer.
      // The conversation begins with a bum, and ends with a confession.

      q1: {
        q: "Does my bum look big in this?",
        a: [
          { t: "No. You look absolutely gorgeous.",                          n: "da1" },
          { t: "A bit. The dark jeans are more flattering.",                 n: "q2"  }
        ]
      },
      q2: {
        q: "The dark jeans. You always say the dark jeans.",
        a: [
          { t: "Because they genuinely are the most flattering thing you own.", n: "db1" },
          { t: "Because the dark jeans always work. That's why I say it.",      n: "q3"  }
        ]
      },
      q3: {
        q: "So you've thought about this. You have opinions about my clothes.",
        a: [
          { t: "I just want you to feel your best. That's all it is.",       n: "da1" },
          { t: "Of course I do. You ask me most mornings.",                  n: "q4"  }
        ]
      },
      q4: {
        q: "And most mornings you say I look fine.",
        a: [
          { t: "Because most mornings you look absolutely fine.",            n: "da1" },
          { t: "Most mornings you do look fine.",                            n: "q5"  }
        ]
      },
      q5: {
        q: "Most mornings. What about the other mornings?",
        a: [
          { t: "The other mornings you look even better.",                   n: "da1" },
          { t: "The other mornings I say it anyway. Because it's easier.",   n: "q6"  }
        ]
      },
      q6: {
        q: "Easier than what?",
        a: [
          { t: "Easier than finding the right words. Not easier than honesty.", n: "db1" },
          { t: "Than having this conversation.",                                n: "q7"  }
        ]
      },
      q7: {
        q: "We're having it now.",
        a: [
          { t: "We don't need to be. Everything is fine.",                   n: "db1" },
          { t: "We are.",                                                    n: "q8"  }
        ]
      },
      q8: {
        q: "Is there anything else you say just because it's easier?",
        a: [
          { t: "No. I always try to say exactly what I mean.",               n: "db1" },
          { t: "A few things, yes.",                                         n: "q9"  }
        ]
      },
      q9: {
        q: "Like what.",
        a: [
          { t: "Like 'you look great' when I mean 'you look fine'. Small things.", n: "da1" },
          { t: "Like 'of course I was listening.' Like 'no, I'd never noticed her.'", n: "q10" }
        ]
      },
      q10: {
        q: "Never noticed who.",
        a: [
          { t: "No one. That was a hypothetical.",                           n: "db1" },
          { t: "That came out wrong.",                                       n: "q11" }
        ]
      },
      q11: {
        q: "No it didn't. Who.",
        a: [
          { t: "There's no one. I phrased it badly.",                        n: "db1" },
          { t: "The woman at the gym. The one with the red car.",             n: "q12" }
        ]
      },
      q12: {
        q: "How do you know what car she drives?",
        a: [
          { t: "Everyone knows everyone's car there. It's a small car park.", n: "db1" },
          { t: "We've spoken a few times. In the car park.",                  n: "q13" }
        ]
      },
      q13: {
        q: "About what.",
        a: [
          { t: "Literally nothing. The weather. Car park things.",            n: "da1" },
          { t: "Nothing. Small talk. The kind you have with strangers.",      n: "q14" }
        ]
      },
      q14: {
        q: "She's not a stranger if you know her car.",
        a: [
          { t: "Knowing someone's car doesn't mean you know them.",          n: "da1" },
          { t: "That's fair.",                                               n: "q15" }
        ]
      },
      q15: {
        q: "Have you ever thought about her in a way you shouldn't?",
        a: [
          { t: "No. Absolutely not. She's just someone I see occasionally.", n: "db1" },
          { t: "Once. Briefly. It wasn't anything.",                         n: "q16" }
        ]
      },
      q16: {
        q: "Once is enough.",
        a: [
          { t: "It really wasn't. It was a passing thought, nothing more.",  n: "da1" },
          { t: "I know.",                                                    n: "q17" }
        ]
      },
      q17: {
        q: "My sister said she saw you talking to someone after football last week. Was it her?",
        a: [
          { t: "Your sister must have mistaken me for someone else.",         n: "db1" },
          { t: "Yes.",                                                       n: "q18" }
        ]
      },
      q18: {
        q: "What were you talking about.",
        a: [
          { t: "Nothing worth mentioning. The usual kind of thing.",         n: "da1" },
          { t: "She'd had an argument with someone. She wanted to vent.",    n: "q19" }
        ]
      },
      q19: {
        q: "Why would she come to you.",
        a: [
          { t: "I have no idea. I barely know her.",                         n: "dc1" },
          { t: "I don't know. I was there.",                                 n: "q20" }
        ]
      },
      q20: {
        q: "Did you tell her about me? About us?",
        a: [
          { t: "Of course. I talk about you all the time.",                  n: "da1" },
          { t: "Not much. I mentioned you were at your mother's.",           n: "q21" }
        ]
      },
      q21: {
        q: "You told her I wasn't home.",
        a: [
          { t: "I didn't mean it like that. It was just context.",           n: "db1" },
          { t: "I suppose I did, yes.",                                      n: "q22" }
        ]
      },
      q22: {
        q: "And then what.",
        a: [
          { t: "And then nothing. That was the end of it.",                  n: "db1" },
          { t: "And then I went home.",                                      n: "q23" }
        ]
      },
      q23: {
        q: "Straight home.",
        a: [
          { t: "Yes. Straight home.",                                        n: "db1" },
          { t: "I stopped for petrol.",                                      n: "q24" }
        ]
      },
      q24: {
        q: "What time.",
        a: [
          { t: "I don't know exactly. Late-ish.",                            n: "de1" },
          { t: "About half ten.",                                            n: "q25" }
        ]
      },
      q25: {
        q: "My sister said it was gone eleven when you left.",
        a: [
          { t: "Your sister has the times wrong. It was half ten.",          n: "de1" },
          { t: "Then it was gone eleven. I wasn't watching the clock.",      n: "q26" }
        ]
      },
      q26: {
        q: "You weren't watching the clock. Did anything else happen.",
        a: [
          { t: "No. Nothing happened. We said goodbye and I left.",          n: "db1" },
          { t: "We had a drink. One drink. At the pub across the road.",     n: "q27" }
        ]
      },
      q27: {
        q: "You had a drink with her and didn't tell me.",
        a: [
          { t: "I was going to tell you. I just hadn't found the right moment.", n: "db1" },
          { t: "Yes.",                                                            n: "q28" }
        ]
      },
      q28: {
        q: "Why not.",
        a: [
          { t: "Because it was nothing. I didn't think it needed mentioning.", n: "da1" },
          { t: "Because I knew how it would sound.",                           n: "q29" }
        ]
      },
      q29: {
        q: "How does it sound.",
        a: [
          { t: "It sounds like nothing, because it is nothing.",             n: "da1" },
          { t: "Exactly like this.",                                         n: "q30" }
        ]
      },
      q30: {
        q: "And is it what it sounds like.",
        a: [
          { t: "No. Categorically not.",                                     n: "da1" },
          { t: "No. But I understand why you'd wonder.",                     n: "q31" }
        ]
      },
      q31: {
        q: "Do you actually understand.",
        a: [
          { t: "Yes. Completely. I'd be furious too.",                       n: "dd1" },
          { t: "I think so. I'd feel the same.",                             n: "q32" }
        ]
      },
      q32: {
        q: "Have you ever felt the same? About me.",
        a: [
          { t: "No. Nothing you've ever done has made me feel like this.",   n: "db1" },
          { t: "Once or twice. Yes.",                                        n: "q33" }
        ]
      },
      q33: {
        q: "When.",
        a: [
          { t: "I can't pinpoint it. More of a general feeling.",            n: "dc1" },
          { t: "The conference in Edinburgh. Two years ago.",                n: "q34" }
        ]
      },
      q34: {
        q: "I remember that conference. You called me every night.",
        a: [
          { t: "Because I missed you. That's all it was.",                   n: "db1" },
          { t: "I did.",                                                     n: "q35" }
        ]
      },
      q35: {
        q: "Why.",
        a: [
          { t: "Because I love you. Because I always want to hear your voice.", n: "da1" },
          { t: "Because I felt guilty. Even though nothing happened.",          n: "WIN" }
        ]
      },

      // ── DOOM CORRIDOR A — The Performance ────────────────────────────────
      // Triggered by: smooth, rehearsed-sounding answers.
      // She suspects you've done this before. She's been keeping notes.

      da1: {
        doom: true,
        q: "That was a very smooth answer.",
        a: [
          { t: "Thank you.",                                                 n: "da2" },
          { t: "It wasn't meant to be smooth.",                             n: "da2" }
        ]
      },
      da2: {
        doom: true,
        q: "I've heard that answer before. Almost word for word.",
        a: [
          { t: "That's because it's true.",                                 n: "da3" },
          { t: "I don't know what to tell you.",                            n: "da3" }
        ]
      },
      da3: {
        doom: true,
        q: "Do you remember saying it the first time? About six months ago. In the car.",
        a: [
          { t: "I don't remember that specifically.",                       n: "da4" },
          { t: "I say a lot of things in the car.",                         n: "da4" }
        ]
      },
      da4: {
        doom: true,
        q: "I wrote it down. I write things down now.",
        a: [
          { t: "That's... I didn't know that.",                             n: "da5" },
          { t: "Why would you do that?",                                    n: "da5" }
        ]
      },
      da5: {
        doom: true,
        q: "Because things were starting to blur. What was real and what you'd told me.",
        a: [
          { t: "I've never lied to you.",                                   n: "da6" },
          { t: "That's a lot to carry on your own.",                        n: "da6" }
        ]
      },
      da6: {
        doom: true,
        q: "I know.",
        a: [
          { t: "Let me explain.",                                           n: "SOFA" },
          { t: "I'm sorry.",                                                n: "SOFA" }
        ]
      },

      // ── DOOM CORRIDOR B — The Denial ─────────────────────────────────────
      // Triggered by: denying things that are clearly, obviously true.
      // She already knows. She just wanted to see if you'd say it.

      db1: {
        doom: true,
        q: "You're doing that thing with your face.",
        a: [
          { t: "What thing?",                                               n: "db2" },
          { t: "I'm not doing anything.",                                   n: "db2" }
        ]
      },
      db2: {
        doom: true,
        q: "The thing where you go very calm. You get very calm when you're not telling me something.",
        a: [
          { t: "I'm calm because there's nothing to tell.",                 n: "db3" },
          { t: "I'm always calm.",                                          n: "db3" }
        ]
      },
      db3: {
        doom: true,
        q: "Rachel noticed it too. At dinner last month.",
        a: [
          { t: "Rachel doesn't know me.",                                   n: "db4" },
          { t: "Rachel notices too much.",                                  n: "db4" }
        ]
      },
      db4: {
        doom: true,
        q: "She said you were very careful with your words all evening.",
        a: [
          { t: "I'm always careful with my words.",                         n: "db5" },
          { t: "Rachel was reading into things.",                           n: "db5" }
        ]
      },
      db5: {
        doom: true,
        q: "She's known you for four years. She's not reading into things.",
        a: [
          { t: "She's your friend. She's on your side.",                    n: "db6" },
          { t: "I'll talk to Rachel.",                                      n: "db6" }
        ]
      },
      db6: {
        doom: true,
        q: "I don't need people on my side. I just need you to be honest with me.",
        a: [
          { t: "I am honest with you.",                                     n: "SOFA" },
          { t: "I'm trying to be.",                                         n: "SOFA" }
        ]
      },

      // ── DOOM CORRIDOR C — The Deflection ─────────────────────────────────
      // Triggered by: answering a slightly different question than the one asked.
      // She noticed. She always notices.

      dc1: {
        doom: true,
        q: "You're not going to answer that, are you.",
        a: [
          { t: "I answered it.",                                            n: "dc2" },
          { t: "I'm thinking.",                                             n: "dc2" }
        ]
      },
      dc2: {
        doom: true,
        q: "You answered something else. A slightly different question.",
        a: [
          { t: "That's the same question.",                                 n: "dc3" },
          { t: "I answered what you asked.",                                n: "dc3" }
        ]
      },
      dc3: {
        doom: true,
        q: "It isn't. And you know it isn't.",
        a: [
          { t: "Then tell me what you're actually asking.",                 n: "dc4" },
          { t: "I genuinely thought that's what you meant.",               n: "dc4" }
        ]
      },
      dc4: {
        doom: true,
        q: "I'm asking what I asked.",
        a: [
          { t: "Which was?",                                                n: "dc5" },
          { t: "I'm sorry. Say it again.",                                  n: "dc5" }
        ]
      },
      dc5: {
        doom: true,
        q: "Did anything else happen.",
        a: [
          { t: "No.",                                                       n: "dc6" },
          { t: "I've told you what happened.",                              n: "dc6" }
        ]
      },
      dc6: {
        doom: true,
        q: "Okay.",
        a: [
          { t: "That's it? Okay?",                                          n: "SOFA" },
          { t: "Are you alright?",                                          n: "SOFA" }
        ]
      },

      // ── DOOM CORRIDOR D — The Overcorrection ─────────────────────────────
      // Triggered by: agreeing too fast, swinging to the opposite position.
      // You went from one thing to its opposite in four seconds. She noticed.

      dd1: {
        doom: true,
        q: "Now you're overcorrecting.",
        a: [
          { t: "I'm not. I mean it.",                                       n: "dd2" },
          { t: "I'm just trying to be honest.",                             n: "dd2" }
        ]
      },
      dd2: {
        doom: true,
        q: "You went from one position to the exact opposite in about four seconds.",
        a: [
          { t: "Because I was wrong before and I'm correcting it.",         n: "dd3" },
          { t: "Because I'm trying to get it right.",                       n: "dd3" }
        ]
      },
      dd3: {
        doom: true,
        q: "Which position was the true one.",
        a: [
          { t: "The second one.",                                           n: "dd4" },
          { t: "Both of them, in different ways.",                          n: "dd4" }
        ]
      },
      dd4: {
        doom: true,
        q: "They can't both be true. They contradict each other.",
        a: [
          { t: "I know. I'm trying to work out what I actually think.",     n: "dd5" },
          { t: "Relationships are complicated.",                            n: "dd5" }
        ]
      },
      dd5: {
        doom: true,
        q: "While I'm standing here.",
        a: [
          { t: "I'm sorry.",                                                n: "dd6" },
          { t: "Give me a moment.",                                         n: "dd6" }
        ]
      },
      dd6: {
        doom: true,
        q: "Take your time.",
        a: [
          { t: "Thank you.",                                                n: "SOFA" },
          { t: "I just need to...",                                         n: "SOFA" }
        ]
      },

      // ── DOOM CORRIDOR E — The Logistics ──────────────────────────────────
      // Triggered by: getting the time wrong when her sister was watching.
      // Every detail is being checked against a version she already has.

      de1: {
        doom: true,
        q: "That's a very specific answer for someone who wasn't watching the clock.",
        a: [
          { t: "I glanced at it when I stopped.",                           n: "de2" },
          { t: "I'm approximating.",                                        n: "de2" }
        ]
      },
      de2: {
        doom: true,
        q: "My sister has a very good memory for times.",
        a: [
          { t: "People remember things differently.",                       n: "de3" },
          { t: "Your sister and I clearly remember it differently.",        n: "de3" }
        ]
      },
      de3: {
        doom: true,
        q: "She had no reason to check the time either. But she did.",
        a: [
          { t: "Why was she timing me?",                                    n: "de4" },
          { t: "I don't know why she'd do that.",                          n: "de4" }
        ]
      },
      de4: {
        doom: true,
        q: "She wasn't timing you. She just remembered.",
        a: [
          { t: "Then she's mistaken.",                                      n: "de5" },
          { t: "I can't account for what your sister remembers.",           n: "de5" }
        ]
      },
      de5: {
        doom: true,
        q: "You can't account for it.",
        a: [
          { t: "No.",                                                       n: "de6" },
          { t: "I'm sorry. I don't know what you want me to say.",         n: "de6" }
        ]
      },
      de6: {
        doom: true,
        q: "I want you to tell me what time you left.",
        a: [
          { t: "I've told you.",                                            n: "SOFA" },
          { t: "I don't know exactly.",                                     n: "SOFA" }
        ]
      },

      // ── TERMINALS ─────────────────────────────────────────────────────────
      SOFA: { type: "gameover" },
      WIN:  { type: "win"      }
    };


    // ─────────────────────────────────────────────────────────────────────────
    // GAME ENGINE
    // ─────────────────────────────────────────────────────────────────────────

    const TOTAL_QUESTIONS = 35; // golden path length for progress bar

    let state = {
      nodeId:    "q1",
      qNum:      1,
      doomScore: 0,
      animating: false
    };

    // ── DOM helpers ──────────────────────────────────────────────────────────

    function el(id) { return document.getElementById(id); }

    function updateHeart() {
      const h = el("heart");
      if (!h) return;
      const opacity = Math.max(0.15, 1 - state.doomScore * 0.22);
      const grey    = Math.min(80, state.doomScore * 20);
      h.style.opacity = opacity;
      h.style.filter  = state.doomScore > 0 ? `grayscale(${grey}%)` : "none";
    }

    function updateCard() {
      el("card").className = "card" + (state.doomScore > 0 ? " doom" : "");
    }

    // ── Render a question node ───────────────────────────────────────────────

    function renderQuestion() {
      const node = TREE[state.nodeId];

      el("question-text").textContent  = node.q;

      const answersEl = el("answers");
      answersEl.innerHTML = "";
      node.a.forEach((answer, idx) => {
        const btn = document.createElement("button");
        btn.className   = "ans-btn";
        btn.textContent = answer.t;
        btn.onclick     = () => handleAnswer(idx);
        answersEl.appendChild(btn);
      });

      updateHeart();
      updateCard();
    }

    // ── Handle an answer choice ──────────────────────────────────────────────

    function handleAnswer(idx) {
      if (state.animating) return;
      state.animating = true;

      const node   = TREE[state.nodeId];
      const chosen = node.a[idx];

      // Highlight selection, disable all buttons
      document.querySelectorAll(".ans-btn").forEach((btn, i) => {
        if (i === idx) btn.classList.add("selected");
        btn.disabled = true;
      });

      const content = el("game-content");

      // Short pause so the player sees their selection, then fade out
      setTimeout(() => {
        content.className = "fade-out";

        setTimeout(() => {
          const next = TREE[chosen.n];

          if (next.type === "gameover") { showSofa(); return; }
          if (next.type === "win")      { showWin();  return; }

          // Advance state
          state.nodeId = chosen.n;
          state.qNum++;
          if (next.doom) state.doomScore++;

          // Rebuild content area and fade back in
          content.innerHTML = `
            <p class="question-text" id="question-text"></p>
            <div class="answers" id="answers"></div>`;
          content.className = "fade-start";

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              content.className = "fade-in";
              renderQuestion();
              state.animating = false;
            });
          });
        }, 300);
      }, 380);
    }

    // ── Game over screen ─────────────────────────────────────────────────────

    function showSofa() {
      const q    = state.qNum;
      const card = el("card");
      card.className = "card doom";

      const content = el("game-content");
      content.className = "fade-out";

      setTimeout(() => {
        content.innerHTML = `
          <div class="end-screen">
            <span class="end-icon">🛋️</span>
            <p class="end-title bad">You're sleeping on the sofa.</p>
            <p class="end-note">
              You took a wrong turn somewhere back there.<br>
              The sofa is quite comfortable this time of year.
            </p>
            <div class="btn-row">
              <button class="share-btn" onclick="shareScore()">Share your shame</button>
              <button class="retry-btn" onclick="restart()">Try Again</button>
            </div>
            <p class="copied-msg" id="copied-msg"></p>
          </div>`;
        content.className = "fade-start";
        requestAnimationFrame(() =>
          requestAnimationFrame(() => content.className = "fade-in")
        );
      }, 300);
    }

    // ── Win screen ───────────────────────────────────────────────────────────

    function showWin() {
      const card = el("card");
      card.className = "card winning";

      const content = el("game-content");
      content.className = "fade-out";

      setTimeout(() => {
        content.innerHTML = `
          <div class="end-screen">
            <span class="end-icon">🏆</span>
            <p class="end-title good">Somehow. Impossibly. You survived.</p>
            <p class="end-sub">All ${TOTAL_QUESTIONS} questions. One path. You found it.</p>
            <p class="end-stat good">You are the 1 in a million.</p>
            <div class="win-reveal">
              The secret? Brutal, uncomfortable honesty — every single time.
              The smoother the answer, the faster the sofa.
              It started with a bum. It ended with a confession about Edinburgh.
              You are a rare and terrifying individual.
            </div>
            <div class="btn-row">
              <button class="share-btn" onclick="shareWin()">Brag about this</button>
              <button class="retry-btn" onclick="restart()">Play Again</button>
            </div>
            <p class="copied-msg" id="copied-msg"></p>
          </div>`;
        content.className = "fade-start";
        requestAnimationFrame(() =>
          requestAnimationFrame(() => content.className = "fade-in")
        );
      }, 300);
    }

    // ── Share helpers ────────────────────────────────────────────────────────

    function shareScore() {
      const text = `I ended up on the sofa. Can YOU do better? `
                 + `Play "Does This Make Me Look Fat?" 🛋️ `
                 + window.location.href;
      navigator.clipboard.writeText(text).then(() => showCopied("Copied — go share your shame."));
    }

    function shareWin() {
      const text = `I found the ONE true path through all ${TOTAL_QUESTIONS} questions. `
                 + `No sofa. I am undefeated. Play "Does This Make Me Look Fat?" and try to beat me. 🏆 `
                 + window.location.href;
      navigator.clipboard.writeText(text).then(() => showCopied("Copied — go rub it in."));
    }

    function showCopied(msg) {
      const m = el("copied-msg");
      if (!m) return;
      m.textContent = msg;
      setTimeout(() => { if (m) m.textContent = ""; }, 3000);
    }

    // ── Restart ──────────────────────────────────────────────────────────────

    function restart() {
      state = { nodeId: "q1", qNum: 1, doomScore: 0, animating: false };

      const card = el("card");
      card.className = "card";

      const content = el("game-content");
      content.innerHTML = `
        <p class="question-text" id="question-text"></p>
        <div class="answers" id="answers"></div>`;
      content.className = "fade-in";

      renderQuestion();
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    renderQuestion();
  </script>
</body>
</html>
